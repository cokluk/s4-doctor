name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Node API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: node --check api/server.js

      - name: Smoke test
        run: |
          node api/server.js &
          PID=$!
          sleep 2
          curl -sf http://127.0.0.1:4789/health | grep -q '"ok":true'
          kill $PID

  vscode-extension:
    name: VS Code extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - run: npm ci
      - run: npm run compile

      - name: Verify build output
        run: test -f out/extension.js

  mcp:
    name: MCP server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension/mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-extension/mcp/package-lock.json

      - run: npm ci
      - run: node --check server.js
